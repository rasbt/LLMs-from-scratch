name: Sync Fork

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/rasbt/LLMs-from-scratch.git
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
